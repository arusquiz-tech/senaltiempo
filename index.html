<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Señal de tiempo</title>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#12141c;
    --surface:#1b1f2a;
    --surface-2:#232838;
    --border:#323a4d;
    --text:#f4efe4;
    --text-dim:#9099ad;
    --brass:#c99a4a;
    --green:#3fb27f;
    --amber:#e3a83b;
    --red:#e2534d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--text);
    min-height:100vh;
    width:100%;
  }
  ::selection{ background:var(--brass); color:#12141c; }

  .screen{
    min-height:100vh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .picker-screen{
    background:
      radial-gradient(circle at 50% 8%, rgba(201,154,74,0.14), transparent 55%),
      radial-gradient(circle at 50% 100%, rgba(63,159,151,0.06), transparent 60%);
  }
  .picker-mark{
    width:56px; height:56px; border-radius:50%;
    margin:0 auto 22px auto;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle, rgba(201,154,74,0.22), rgba(201,154,74,0.02));
    box-shadow:inset 0 0 0 1px rgba(201,154,74,0.35);
  }
  .picker-mark svg{ width:26px; height:26px; }
  .picker-head{ text-align:center; margin-bottom:6px; }
  .picker-head h1{ text-align:center; }
  .picker-head p.sub{ text-align:center; }
  .picker-eyebrow{
    text-align:center;
    font-size:11px; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--brass); font-weight:700; margin:0 0 12px 0;
  }

  .card{
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:600;
    margin:0 0 10px 2px;
  }

  h1.title{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin:0 0 4px 2px;
    letter-spacing:0.2px;
  }
  p.sub{
    color:var(--text-dim);
    font-size:14px;
    margin:0 0 4px 2px;
  }

  /* ---- role picker ---- */
  .option{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    gap:18px;
    cursor:pointer;
    transition:border-color .15s, transform .15s, background .15s;
    text-align:left;
    width:100%;
    color:var(--text);
    font-family:inherit;
  }
  .option:hover{ border-color:var(--brass); background:var(--surface-2); transform:translateY(-1px); }
  .option:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }
  .dot{ width:13px;height:13px;border-radius:50%; flex-shrink:0; box-shadow:0 0 0 4px rgba(255,255,255,0.04); }
  .option-text h2{ font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin:0 0 3px 0; }
  .option-text p{ font-size:13px; color:var(--text-dim); margin:0; }
  .badge{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .badge svg{ width:21px; height:21px; }
  .option-arrow{ margin-left:auto; color:var(--text-dim); flex-shrink:0; }
  .option-arrow svg{ width:16px; height:16px; }

  /* ---- code ---- */
  .code-box{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:22px;
    text-align:center;
  }
  .code-box .code{
    font-family:'Fraunces',serif;
    font-size:46px;
    font-weight:600;
    letter-spacing:8px;
    color:var(--brass);
    margin:6px 0;
  }
  .code-box p{ color:var(--text-dim); font-size:13px; margin:0; }

  input.code-input{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    font-family:'Fraunces',serif;
    font-size:30px;
    letter-spacing:8px;
    text-align:center;
    color:var(--text);
    width:100%;
  }
  input.code-input:focus{ outline:2px solid var(--brass); border-color:var(--brass); }

  input.minutes-input{
    width:76px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    font-family:'Fraunces',serif;
    font-size:18px;
    text-align:center;
    color:var(--text);
  }
  input.minutes-input:focus{ outline:2px solid var(--brass); border-color:var(--brass); }
  .timer-row{ display:flex; align-items:center; gap:10px; }
  .timer-row span{ font-size:13px; color:var(--text-dim); }

  button.primary{
    background:var(--brass);
    border:none;
    color:#20160a;
    font-weight:700;
    font-size:15px;
    padding:16px;
    border-radius:14px;
    cursor:pointer;
    font-family:inherit;
  }
  button.primary:disabled{ opacity:0.35; cursor:default; }
  button.link-btn{
    background:none; border:none; color:var(--text-dim);
    font-size:13px; cursor:pointer; padding:6px 10px; border-radius:8px;
    font-family:inherit;
  }
  button.link-btn:hover{ background:var(--surface-2); color:var(--text); }

  .panel-header{ display:flex; align-items:center; justify-content:space-between; }

  .section{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
  }

  /* time chips */
  .time-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
  }
  .time-chip{
    display:flex; align-items:center; gap:12px;
    background:var(--surface-2); border:2px solid var(--border); border-radius:12px;
    padding:14px; cursor:pointer; transition:border-color .15s; color:var(--text); font-family:inherit;
  }
  .time-chip:hover{ border-color:#454f68; }
  .time-chip.active{ border-color:var(--chip-color, var(--brass)); }
  .time-chip .dot{ width:12px; height:12px; }
  .time-chip span{ font-size:14px; font-weight:600; }
  .over-chip{
    grid-column:1 / -1;
  }

  .reset-btn{
    margin-top:2px; background:none; border:1px dashed var(--border); color:var(--text-dim);
    border-radius:12px; padding:11px; font-size:13px; cursor:pointer; font-family:inherit; width:100%;
  }
  .reset-btn:hover{ color:var(--text); border-color:#454f68; }

  /* message */
  textarea.msg-input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    resize:none;
    min-height:64px;
  }
  textarea.msg-input:focus{ outline:2px solid var(--brass); border-color:var(--brass); }
  .msg-row{ display:flex; align-items:center; justify-content:space-between; margin-top:10px; gap:10px; }
  .char-count{ font-size:12px; color:var(--text-dim); }
  button.send-btn{
    background:var(--brass); border:none; color:#20160a; font-weight:700;
    font-size:13px; padding:10px 18px; border-radius:10px; cursor:pointer; font-family:inherit;
  }
  button.send-btn:disabled{ opacity:0.35; cursor:default; }

  /* color picker */
  .swatch-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .swatch{
    width:34px; height:34px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; transition:transform .15s, border-color .15s;
  }
  .swatch:hover{ transform:scale(1.08); }
  .swatch.active{ border-color:var(--text); }
  input.custom-color{
    width:34px; height:34px; border-radius:50%; border:2px solid var(--border);
    padding:0; background:none; cursor:pointer;
  }

  .status-line{ margin-top:2px; font-size:12px; color:var(--text-dim); text-align:center; }

  /* ---- display ---- */
  .display-wrap{
    width:100%; height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px; text-align:center; padding:32px;
    position:fixed; top:0; left:0;
    transition:background 0.6s ease;
  }
  .beacon{
    width:min(42vw, 300px); height:min(42vw, 300px); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transition:box-shadow .5s ease, background .5s ease;
    margin-bottom:28px;
  }
  .beacon svg{ width:42%; height:42%; }
  .msg-title{
    font-family:'Fraunces',serif; font-weight:600; font-size:clamp(30px,5.2vw,54px);
    margin:0; letter-spacing:0.2px; line-height:1.15; max-width:800px;
  }
  .msg-sub{ font-size:clamp(14px,1.6vw,18px); color:var(--text-dim); margin:14px 0 0 0; max-width:540px; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.045); } }
  .pulsing{ animation: pulse 1.1s ease-in-out infinite; }
  .exit{
    position:fixed; top:16px; right:16px; background:rgba(255,255,255,0.06); border:none;
    color:var(--text-dim); font-size:12px; padding:6px 10px; border-radius:8px; cursor:pointer; font-family:inherit;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyChZwY7Uf4np6egC8lRWPvzeSjXSOXVKUQ",
  authDomain: "orappsud.firebaseapp.com",
  databaseURL: "https://orappsud-default-rtdb.firebaseio.com",
  projectId: "orappsud",
  storageBucket: "orappsud.firebasestorage.app",
  messagingSenderId: "154677363130",
  appId: "1:154677363130:web:f48296675aefb1bb919d83"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const root = document.getElementById('app');
let role = null;
let roomCode = null;
let dbRef = null;

let currentStatus = 'ready';
let currentMessage = '';
let accentColor = '#c99a4a';
let lastSentAt = null;
let currentEndTime = null;
let currentTotalMs = null;

const COLOR_PRESETS = ['#c99a4a', '#3f9f97', '#8b7bd8', '#d97ba0', '#4d8dff', '#3fb27f'];

function hexToRgb(hex){
  const h = hex.replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}
function rgbToHex(r,g,b){
  return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}
function lerpColor(c1, c2, t){
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a.r + (b.r-a.r)*t);
  const g = Math.round(a.g + (b.g-a.g)*t);
  const bl = Math.round(a.b + (b.b-a.b)*t);
  return rgbToHex(r,g,bl);
}
function colorForFraction(elapsedFraction){
  const GREEN = '#3fb27f', AMBER = '#e3a83b', RED = '#e2534d';
  if(elapsedFraction <= 0.6) return lerpColor(GREEN, AMBER, elapsedFraction/0.6);
  return lerpColor(AMBER, RED, (elapsedFraction-0.6)/0.4);
}
function formatMMSS(ms){
  const total = Math.max(0, Math.floor(ms/1000));
  const m = Math.floor(total/60), s = total%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

const TIME_SIGNALS = {
  ten:   { minutes: 10, color:'#3fb27f', title:'Faltan 10 minutos', sub:'Sigue adelante con normalidad.' },
  five:  { minutes: 5,  color:'#3fb27f', title:'Faltan 5 minutos',  sub:'Puedes ir preparando el cierre de tu tema.' },
  three: { minutes: 3,  color:'#e3a83b', title:'Faltan 3 minutos',  sub:'Empieza a resumir las ideas principales.' },
  one:   { minutes: 1,  color:'#e3a83b', title:'Falta 1 minuto',    sub:'Por favor, comienza a concluir tu mensaje.' },
};
const OVER = { color:'#e2534d', title:'Tiempo terminado', sub:'El tiempo asignado ha finalizado. Gracias por tu mensaje.' };
const READY = { title:'En tiempo', sub:'El discurso está en curso con normalidad.' };

function clockIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="${color}" stroke-width="1.6"/><path d="M12 7v5l3.2 2" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/></svg>`;
}
function stopIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="5" width="14" height="14" rx="2" stroke="${color}" stroke-width="1.6"/></svg>`;
}
function msgIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5z" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
}
function dotIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" fill="${color}"/></svg>`;
}
function phoneIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><rect x="7" y="2.5" width="10" height="19" rx="2.2" stroke="${color}" stroke-width="1.6"/><path d="M10.5 18.2h3" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/></svg>`;
}
function tabletIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="4" width="17" height="16" rx="2.2" stroke="${color}" stroke-width="1.6"/><path d="M9.5 17.3h5" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/></svg>`;
}
function spotlightIcon(color){
  return `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="4.2" stroke="${color}" stroke-width="1.6"/><path d="M8 20l1.6-6.3M16 20l-1.6-6.3" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/></svg>`;
}
function arrowIcon(){
  return `<svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function generateCode(){ return String(Math.floor(1000 + Math.random()*9000)); }
function timeAgo(ts){
  if(!ts) return '';
  const s = Math.round((Date.now()-ts)/1000);
  if(s<2) return 'justo ahora';
  if(s<60) return `hace ${s}s`;
  return `hace ${Math.round(s/60)} min`;
}

function pushState(partial){
  const payload = {
    status: partial.status !== undefined ? partial.status : currentStatus,
    message: partial.message !== undefined ? partial.message : currentMessage,
    color: partial.color !== undefined ? partial.color : accentColor,
    endTime: Object.prototype.hasOwnProperty.call(partial,'endTime') ? partial.endTime : currentEndTime,
    totalMs: Object.prototype.hasOwnProperty.call(partial,'totalMs') ? partial.totalMs : currentTotalMs,
    updatedAt: Date.now()
  };
  currentStatus = payload.status;
  currentMessage = payload.message;
  accentColor = payload.color;
  currentEndTime = payload.endTime;
  currentTotalMs = payload.totalMs;
  lastSentAt = payload.updatedAt;
  renderControl();
  if(dbRef){ dbRef.set(payload).catch(e => console.error('Error al enviar:', e)); }
}

function goPicker(){
  role = null; roomCode = null;
  if(dbRef){ dbRef.off(); dbRef = null; }
  renderPicker();
}

function startControl(){
  roomCode = generateCode();
  role = 'control';
  currentStatus = 'ready'; currentMessage = ''; accentColor = '#c99a4a'; lastSentAt = null;
  currentEndTime = null; currentTotalMs = null;
  dbRef = db.ref('sessions/' + roomCode);
  dbRef.set({ status:'ready', message:'', color: accentColor, endTime:null, totalMs:null, updatedAt: Date.now() });
  renderControl();
}

let soundEnabled = true;
let audioCtx = null;
let lastNotifiedAt = null;

function unlockAudio(){
  try{
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }catch(e){ console.error('No se pudo iniciar el audio:', e); }
}

function playChime(){
  if(!soundEnabled || !audioCtx) return;
  try{
    const ctx = audioCtx;
    const now = ctx.currentTime;
    [0, 0.18].forEach((offset, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = i === 0 ? 880 : 1108;
      gain.gain.setValueAtTime(0, now + offset);
      gain.gain.linearRampToValueAtTime(0.28, now + offset + 0.02);
      gain.gain.linearRampToValueAtTime(0, now + offset + 0.16);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.18);
    });
  }catch(e){ console.error('No se pudo reproducir el sonido:', e); }
}

function vibrateDevice(){
  if(!soundEnabled) return;
  try{ if(navigator.vibrate) navigator.vibrate([180,80,180]); }catch(e){}
}

function notifyNewSignal(){
  playChime();
  vibrateDevice();
}

function joinAsDisplay(code){
  roomCode = code;
  role = 'display';
  unlockAudio();
  lastNotifiedAt = null;
  dbRef = db.ref('sessions/' + roomCode);
  renderDisplay();
  dbRef.on('value', snap => {
    const val = snap.val();
    if(!val) return;
    currentStatus = val.status || 'ready';
    currentMessage = val.message || '';
    accentColor = val.color || '#c99a4a';
    currentEndTime = val.endTime || null;
    currentTotalMs = val.totalMs || null;
    renderDisplay();
    if(lastNotifiedAt === null){
      lastNotifiedAt = val.updatedAt || Date.now();
    } else if(val.updatedAt && val.updatedAt !== lastNotifiedAt){
      lastNotifiedAt = val.updatedAt;
      notifyNewSignal();
    }
  });
}

setInterval(() => {
  if(role === 'display' && currentStatus === 'timer'){
    renderDisplay();
  }
  if(role === 'control' && currentStatus === 'timer' && currentEndTime){
    const el = document.getElementById('timer-live');
    if(el){
      const remaining = currentEndTime - Date.now();
      el.textContent = remaining > 0 ? `Tiempo restante: ${formatMMSS(remaining)}` : 'Tiempo terminado';
    }
  }
}, 1000);

function renderPicker(){
  root.innerHTML = `
    <div class="screen picker-screen">
      <div class="card">
        <div class="picker-mark">${spotlightIcon('var(--brass)')}</div>
        <div class="picker-head">
          <p class="picker-eyebrow">Señales de tiempo</p>
          <h1 class="title">¿Cómo vas a usar<br>este dispositivo?</h1>
          <p class="sub">Un dispositivo envía los avisos, el otro los muestra.</p>
        </div>
        <button class="option" id="pick-control">
          <span class="badge" style="background:radial-gradient(circle, rgba(63,178,127,0.22), rgba(63,178,127,0.02)); box-shadow:inset 0 0 0 1px rgba(63,178,127,0.4);">${phoneIcon('var(--green)')}</span>
          <span class="option-text"><h2>Panel de control</h2><p>Celular — crea una sala nueva</p></span>
          <span class="option-arrow">${arrowIcon()}</span>
        </button>
        <button class="option" id="pick-display">
          <span class="badge" style="background:radial-gradient(circle, rgba(226,83,77,0.2), rgba(226,83,77,0.02)); box-shadow:inset 0 0 0 1px rgba(226,83,77,0.4);">${tabletIcon('var(--red)')}</span>
          <span class="option-text"><h2>Pantalla del orador</h2><p>Tablet — ingresa el código de la sala</p></span>
          <span class="option-arrow">${arrowIcon()}</span>
        </button>
      </div>
    </div>
  `;
  document.getElementById('pick-control').onclick = startControl;
  document.getElementById('pick-display').onclick = renderJoinScreen;
}

function renderJoinScreen(){
  root.innerHTML = `
    <div class="screen picker-screen">
      <div class="card">
        <div class="picker-mark">${tabletIcon('var(--brass)')}</div>
        <h1 class="title" style="text-align:center;">Pantalla del orador</h1>
        <p class="sub" style="text-align:center;">Ingresa el código de 4 dígitos que aparece en el celular.</p>
        <input class="code-input" id="code-input" maxlength="4" inputmode="numeric" placeholder="0000">
        <button class="primary" id="join-btn" disabled>Conectar</button>
        <button class="link-btn" id="back-btn" style="align-self:center;">Volver</button>
      </div>
    </div>
  `;
  const input = document.getElementById('code-input');
  const btn = document.getElementById('join-btn');
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g,'').slice(0,4);
    btn.disabled = input.value.length !== 4;
  });
  btn.onclick = () => joinAsDisplay(input.value);
  document.getElementById('back-btn').onclick = goPicker;
}

function renderControl(){
  const order = ['ten','five','three','one'];
  root.innerHTML = `
    <div class="screen">
      <div class="card">
        <div class="panel-header">
          <h1 class="title">Panel de control</h1>
          <button class="link-btn" id="back-btn">Salir</button>
        </div>

        <div class="code-box">
          <p>Código de esta sala</p>
          <div class="code">${roomCode}</div>
          <p>Ingrésalo en la tablet para conectarla</p>
        </div>

        <div class="section">
          <p class="eyebrow">Señales de tiempo</p>
          <div class="time-grid">
            ${order.map(key=>{
              const s = TIME_SIGNALS[key];
              const active = currentStatus===key ? 'active' : '';
              return `<button class="time-chip ${active}" style="--chip-color:${s.color}" data-status="${key}">
                <span class="dot" style="background:${s.color}"></span>
                <span>${s.title.replace('Faltan ','').replace('Falta ','')}</span>
              </button>`;
            }).join('')}
            <button class="time-chip over-chip ${currentStatus==='over'?'active':''}" style="--chip-color:var(--red)" data-status="over">
              <span class="dot" style="background:var(--red)"></span>
              <span>Tiempo terminado</span>
            </button>
          </div>
          <button class="reset-btn" id="reset-btn">Reiniciar (volver a "En tiempo")</button>
        </div>

        <div class="section">
          <p class="eyebrow">Tiempo personalizado</p>
          <div class="timer-row">
            <input type="number" class="minutes-input" id="custom-minutes" min="1" max="90" value="12">
            <span>minutos</span>
            <button class="send-btn" id="start-timer-btn">Iniciar</button>
          </div>
          ${currentStatus==='timer' ? `
            <button class="reset-btn" id="stop-timer-btn" style="margin-top:12px;">Detener temporizador</button>
            <p class="status-line" id="timer-live">Tiempo restante: ${currentEndTime ? formatMMSS(currentEndTime-Date.now()) : ''}</p>
          ` : `<p class="status-line" style="margin-top:10px;">El color de la pantalla pasará de verde a ámbar a rojo según avance el tiempo.</p>`}
        </div>

        <div class="section">
          <p class="eyebrow">Mensaje personalizado</p>
          <textarea class="msg-input" id="msg-input" maxlength="80" placeholder="Ej: Por favor acércate al micrófono">${currentStatus==='custom' ? currentMessage : ''}</textarea>
          <div class="msg-row">
            <span class="char-count" id="char-count">0/80</span>
            <button class="send-btn" id="send-msg-btn">Enviar a la pantalla</button>
          </div>
        </div>

        <div class="section">
          <p class="eyebrow">Color de pantalla</p>
          <div class="swatch-row">
            ${COLOR_PRESETS.map(c => `<button class="swatch ${accentColor===c?'active':''}" style="background:${c}" data-color="${c}" aria-label="Color ${c}"></button>`).join('')}
            <input type="color" class="custom-color" id="custom-color" value="${accentColor}" title="Elegir otro color">
          </div>
        </div>

        <p class="status-line">${lastSentAt ? `Última señal enviada ${timeAgo(lastSentAt)}` : 'Aún no se ha enviado ninguna señal'}</p>
      </div>
    </div>
  `;
  document.getElementById('back-btn').onclick = goPicker;
  document.getElementById('reset-btn').onclick = () => pushState({ status:'ready', message:'', endTime:null, totalMs:null });

  root.querySelectorAll('.time-chip').forEach(b => {
    b.onclick = () => pushState({ status: b.getAttribute('data-status'), message:'', endTime:null, totalMs:null });
  });

  document.getElementById('start-timer-btn').onclick = () => {
    const mins = parseFloat(document.getElementById('custom-minutes').value);
    if(!mins || mins <= 0) return;
    const totalMs = mins * 60000;
    const endTime = Date.now() + totalMs;
    pushState({ status:'timer', message:'', endTime, totalMs });
  };
  const stopBtn = document.getElementById('stop-timer-btn');
  if(stopBtn){
    stopBtn.onclick = () => pushState({ status:'ready', message:'', endTime:null, totalMs:null });
  }

  const msgInput = document.getElementById('msg-input');
  const charCount = document.getElementById('char-count');
  const sendBtn = document.getElementById('send-msg-btn');
  const updateCount = () => { charCount.textContent = `${msgInput.value.length}/80`; };
  updateCount();
  msgInput.addEventListener('input', updateCount);
  sendBtn.onclick = () => {
    const text = msgInput.value.trim();
    if(!text) return;
    pushState({ status:'custom', message:text, endTime:null, totalMs:null });
  };

  root.querySelectorAll('.swatch').forEach(sw => {
    sw.onclick = () => pushState({ color: sw.getAttribute('data-color') });
  });
  document.getElementById('custom-color').addEventListener('change', (e) => {
    pushState({ color: e.target.value });
  });
}

function renderDisplay(){
  let title, sub, color, icon, pulsing = false;

  if(currentStatus === 'timer'){
    const remaining = (currentEndTime || 0) - Date.now();
    if(remaining <= 0){
      title = OVER.title; sub = OVER.sub; color = OVER.color; icon = stopIcon(OVER.color); pulsing = true;
    } else {
      const elapsedFraction = currentTotalMs ? Math.min(1, Math.max(0, 1 - remaining/currentTotalMs)) : 0;
      color = colorForFraction(elapsedFraction);
      title = formatMMSS(remaining);
      sub = 'Tiempo restante';
      icon = clockIcon(color);
    }
  } else if(currentStatus === 'over'){
    title = OVER.title; sub = OVER.sub; color = OVER.color; icon = stopIcon(OVER.color); pulsing = true;
  } else if(currentStatus === 'custom'){
    title = currentMessage || READY.title; sub = ''; color = accentColor; icon = msgIcon(accentColor);
  } else if(TIME_SIGNALS[currentStatus]){
    const s = TIME_SIGNALS[currentStatus];
    title = s.title; sub = s.sub; color = s.color; icon = clockIcon(s.color);
  } else {
    title = READY.title; sub = READY.sub; color = accentColor; icon = dotIcon(accentColor);
  }

  root.innerHTML = `
    <button class="exit" id="exit-btn">Salir de la sala</button>
    <button class="exit" id="sound-btn" style="right:140px;">${soundEnabled ? 'Sonido: activado' : 'Sonido: silenciado'}</button>
    <div class="display-wrap" style="background:radial-gradient(circle at 50% 38%, ${color}17, var(--bg) 72%)">
      <div class="beacon ${pulsing?'pulsing':''}" style="background:${color}1f; box-shadow:0 0 70px 14px ${color}30, inset 0 0 0 3px ${color}66;">
        ${icon}
      </div>
      <p class="msg-title" style="color:${color}">${title}</p>
      ${sub ? `<p class="msg-sub">${sub}</p>` : ''}
    </div>
  `;
  document.getElementById('exit-btn').onclick = goPicker;
  document.getElementById('sound-btn').onclick = () => {
    soundEnabled = !soundEnabled;
    if(soundEnabled) unlockAudio();
    renderDisplay();
  };
}

renderPicker();
</script>
</body>
</html>
